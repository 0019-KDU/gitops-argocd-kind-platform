apiVersion: v1
kind: Service
metadata:
  name: url-shortener-redis
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener-redis
    app.kubernetes.io/component: cache
spec:
  # ClusterIP — Redis is never exposed outside the cluster
  type: ClusterIP
  selector:
    app: url-shortener-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
