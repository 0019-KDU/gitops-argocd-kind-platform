apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-redis
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener-redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  # Recreate avoids two Redis pods writing to the same PVC simultaneously
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: url-shortener-redis
  template:
    metadata:
      labels:
        app: url-shortener-redis
        app.kubernetes.io/name: url-shortener-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - "128mb"
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
