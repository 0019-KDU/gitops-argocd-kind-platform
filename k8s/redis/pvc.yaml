apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener-redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Remove storageClassName to use the cluster default
  # storageClassName: standard
