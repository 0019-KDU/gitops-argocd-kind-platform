apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: url-shortener

resources:
  - namespace.yaml
  - configmap.yaml
  # secret.yaml excluded — create manually with kubectl (never commit real secrets)
  - redis/pvc.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - app/deployment.yaml
  - app/service.yaml
  - app/hpa.yaml
  - ingress.yaml
