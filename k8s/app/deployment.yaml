apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener-app
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener-app
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener-app
  template:
    metadata:
      labels:
        app: url-shortener-app
        app.kubernetes.io/name: url-shortener-app
    spec:
      # Spread pods across nodes for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: url-shortener-app
      containers:
        - name: app
          image: chiradev/url-shortener:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: url-shortener-config
          env:
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secret
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: url-shortener-secret
                  key: REDIS_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Readiness: stop sending traffic until the app + its deps are ready
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Liveness: restart the container if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      # Give pods 30 s to finish in-flight requests before being killed
      terminationGracePeriodSeconds: 30
