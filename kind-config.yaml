kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gitops
nodes:
  - role: control-plane
    image: kindest/node:v1.33.1
    # Required so nginx ingress controller binds to this node
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80    # nginx ingress → url-shortener app
        hostPort: 80
        protocol: TCP
      - containerPort: 443   # nginx ingress TLS (optional for local)
        hostPort: 443
        protocol: TCP
      - containerPort: 30080 # ArgoCD UI (NodePort)
        hostPort: 30080
        protocol: TCP

  - role: worker             # App pods + Redis
    image: kindest/node:v1.33.1
  - role: worker             # App pods (HPA spread)
    image: kindest/node:v1.33.1
  - role: worker             # Overflow / ArgoCD workloads
    image: kindest/node:v1.33.1
